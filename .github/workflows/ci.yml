name: CI                     		# 워크플로우 이름 (GitHub UI에 표시)

on: [push]                   		# 이벤트: push가 발생할 때 실행

jobs:                        		# 작업들 정의
  build:                     		# build라는 이름의 작업
    runs-on: ubuntu-latest    		# 실행 환경: 우분투 최신 버전
    steps:                              # 작업 단계들 (여기서부터 2칸씩 더 들어감)
      - name: Checkout code
        uses: actions/checkout@v2       # 코드를 runner로 가져오기

      - name: Set up JDK 17
        uses: actions/setup-java@v2     # JDK 설정 (JDK 17로 설정)
        with:
          java-version: '17'            # 현재 프로젝트 Java 버전과 맞추세요
          distribution: 'temurin'       # 어떤 배포판(distribution)을 사용할지 명시

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Say Hello
        run: echo "Hello, DevOps!"      # 간단한 명령어 실행
