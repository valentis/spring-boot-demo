name: CI with Docker

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'       # 어떤 배포판(distribution)을 사용할지 명시
          
      - name: Build with Maven
        run: mvn -B package --file pom.xml
        
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USER }}/myapp:${{ github.sha }} .
        
      - name: Push to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin
          docker push ${{ secrets.DOCKER_USER }}/myapp:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_USER }}/myapp:${{ github.sha }} ${{ secrets.DOCKER_USER }}/myapp:latest
          docker push ${{ secrets.DOCKER_USER }}/myapp:latest
